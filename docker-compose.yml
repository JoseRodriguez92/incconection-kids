# docker-compose.yml — va en el SERVIDOR (no se sube al repo)
# Las variables de entorno se leen del archivo .env en la misma carpeta

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: incconection-kids
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Variables del servidor (server-side only)
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      # Variables públicas (también necesarias en runtime)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
